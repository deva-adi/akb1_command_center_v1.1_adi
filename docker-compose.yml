version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akb1-command-center
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
